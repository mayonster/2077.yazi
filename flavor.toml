#File-specific styles {

[filetype]

rules = [
	# Image
	{ mime = "image/*", fg = "#fb32ff" },
	# Media
	{ mime = "{audio,video}/*", fg = "#fb32ff" },
	# Archive
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#ffd400" },
	# Document
	{ mime = "application/{pdf,doc,rtf}", fg = "#9e0a52" },
	# Virtual file system
	{ mime = "vfs/{absent,stale}", fg = "#8998c9" },
	#Special
	{ url = "*", is = "orphan", fg = "#e40000" },
	{ url = "*", is = "exec", fg = "#13db77" },
	{ url = "*", is = "link", fg = "#ffd400" },
	# Fallback
	{ url = "*", fg = "#0098df" },
	{ url = "*/", fg = "#0098df" },
]

# }

